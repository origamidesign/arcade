<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 🎯 cadre 4:3 arcade */
.wrapper {
  position: relative;
  width: 100vw;
  height: 75vh; /* 4:3 ratio (75% de 100%) */
  max-width: 133.33vh; /* maintien ratio */
  max-height: 100vh;
}

/* iframe propre */
iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<div class="wrapper">
  <iframe 
    id="iframehtml5"
    class="d-block iframe-default"
    src="https://retrogamesonline.io/play/sonic-the-hedgehog-usa-europe"
    scrolling="no"
    allowfullscreen>
  </iframe>
</div>

</body>
</html>
