<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 🔥 cadre légèrement plus large pour éviter UI coupée */
.wrapper {
  position: relative;
  width: 92vw;
  height: calc(92vw * 0.5625); /* 16:9 propre */
  max-height: 92vh;
  max-width: calc(92vh * 1.777);
  overflow: hidden;
  background: black;
  border-radius: 10px; /* optionnel mais arcade look */
}

/* iframe SANS zoom */
iframe {
  position: absolute;
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<div class="wrapper">
  <iframe 
    src="https://retrogamesonline.io/play/sonic-the-hedgehog-usa-europe"
    allowfullscreen>
  </iframe>
</div>

</body>
</html>
