<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="viewport" content="width=1200, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
}

/* cadre principal */
.wrapper {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

/* iframe du jeu */
iframe {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1.06);
  width: 1280px;
  height: 720px;
  transform: scale(0.9);
  transform-origin: top left;
  border: none;
}
</style>
</head>

<body>

<div class="wrapper">
  <iframe src="https://retrogamesonline.io/play/sonic-the-hedgehog-usa-europe"></iframe>
</div>

</body>
</html>
