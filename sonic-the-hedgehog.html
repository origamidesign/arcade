<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* cadre volontairement PLUS LARGE */
.wrapper {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: black;
}

/* 🔥 clé du fix */
iframe {
  position: absolute;

  /* on force une base “desktop stable” */
  width: 1280px;
  height: 720px;

  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(calc(min(1, 100vw / 1280)));

  border: none;
}
</style>
</head>

<body>

<div class="wrapper">
  <iframe 
    src="https://retrogamesonline.io/play/sonic-the-hedgehog-usa-europe"
    allowfullscreen>
  </iframe>
</div>

</body>
</html>
