<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* =========================
   RESET GLOBAL
========================= */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
}

/* =========================
   CONTENEUR ARCADE
========================= */
.wrapper {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  overflow: hidden;
}

/* =========================
   IFRAME GAME
========================= */
iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}
</style>
</head>

<body>

<div class="wrapper">
  <iframe 
    src="https://retrogamesonline.io/play/sonic-the-hedgehog-usa-europe"
    allowfullscreen>
  </iframe>
</div>

</body>
</html>
