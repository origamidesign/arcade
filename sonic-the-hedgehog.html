<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
}

.wrapper {
  position: relative;
  width: 100vw;
  height: 56.25vw;
  max-height: 100vh;
  max-width: 177.78vh;
  overflow: hidden;
}

/* 🔥 TRUC IMPORTANT ICI */
iframe {
  position: absolute;
  width: 110%;
  height: 110%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1.05);
  border: none;
}
</style>
</head>

<body>

<div class="wrapper">
  <iframe 
    src="https://retrogamesonline.io/play/sonic-the-hedgehog-usa-europe"
    allowfullscreen>
  </iframe>
</div>

</body>
</html>
