<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
}

.wrapper {
  position: absolute;
  inset: 0;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* overlay clic */
#overlay {
  position: absolute;
  inset: 0;
  background: transparent;
  z-index: 10;
}
</style>
</head>

<body>

<div class="wrapper">
  <iframe id="game"
    src="https://retrogamesonline.io/play/sonic-the-hedgehog-usa-europe">
  </iframe>

  <div id="overlay"></div>
</div>

<script>
const overlay = document.getElementById("overlay");
const iframe = document.getElementById("game");

overlay.addEventListener("click", () => {
  // 🔥 force reload du jeu (équivalent PLAY NOW)
  iframe.src = iframe.src;

  // enlève l’overlay
  overlay.style.display = "none";
});
</script>

</body>
</html>
