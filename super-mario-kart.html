<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
}

/* 🎯 cadre ajusté comme ton autre arcade */
.wrapper {
  position: absolute;

  /* SCALE */
  width: 93.7vw;
  height: 70.2vh;

  /* centrage horizontal */
  left: 50%;
  transform: translateX(-50%);

  /* OFFSET vertical */
  top: 2.3vh;

  background: black;
  overflow: hidden;
}

/* 🎮 iframe */
iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}
</style>
</head>

<body>

<div class="wrapper">
  <iframe
    src="https://gamesfrog.com/games/snes/super-mario-kart/iframe"
    scrolling="no"
    allowfullscreen
    loading="eager">
  </iframe>
</div>

</body>
</html>
