<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🔧 AJUSTEMENTS PIXEL PAR PIXEL */
:root {
  --w: 100px;   /* largeur + ou - */
  --h: 200px;   /* hauteur + ou - */
  --x: 0px;   /* gauche/droite */
  --y: 130px;   /* haut/bas */
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 🎯 cadre 4:3 arcade propre */
.wrapper {
  position: relative;

  /* 🔥 TON CODE + ajustement */
  width: calc(100vw + var(--w));
  height: calc(75vh + var(--h));

  max-width: 133.33vh;
  max-height: 100vh;

  background: black;

  /* 🔥 déplacement */
  transform: translate(var(--x), var(--y));
}

/* 🎮 iframe full clean */
iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

</style>
</head>

<body>

<div class="wrapper">
  <iframe
    src="https://gamesfrog.com/games/snes/super-mario-kart/iframe"
    scrolling="no"
    allowfullscreen
    loading="eager">
  </iframe>
</div>

</body>
</html>
