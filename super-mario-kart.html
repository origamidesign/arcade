<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🔧 AJUSTEMENTS */
:root {
  --x: 0px;   /* décalage horizontal du cadre */
  --y: 0px;   /* décalage vertical du cadre */

  --iw: 0px;  /* étirement horizontal visible du jeu */
  --ih: 0px;  /* étirement vertical visible du jeu */

  --ix: 0px;  /* décalage horizontal du jeu dans le cadre */
  --iy: 0px;  /* décalage vertical du jeu dans le cadre */
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 🎯 cadre 4:3 arcade propre */
.wrapper {
  position: relative;
  width: 100vw;
  height: 75vh; /* ratio 4:3 */
  max-width: 133.33vh;
  max-height: 100vh;
  background: black;
  overflow: hidden;

  /* déplacement du cadre */
  transform: translate(var(--x), var(--y));
}

/* 🎮 iframe full clean */
iframe {
  position: absolute;
  top: 50%;
  left: 50%;

  width: calc(100% + var(--iw));
  height: calc(100% + var(--ih));

  border: none;
  display: block;

  /* centrage + décalage du jeu */
  transform: translate(calc(-50% + var(--ix)), calc(-50% + var(--iy)));
}

</style>
</head>

<body>

<div class="wrapper">
  <iframe
    src="https://gamesfrog.com/games/snes/super-mario-kart/iframe"
    scrolling="no"
    allowfullscreen
    loading="eager">
  </iframe>
</div>

</body>
</html>
