<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🔧 AJUSTEMENTS */
:root {
  --w: 0px;   /* étirement horizontal des 2 côtés */
  --h: 0px;   /* étirement vertical des 2 côtés */
  --x: 0px;   /* déplacement horizontal */
  --y: 0px;   /* déplacement vertical */
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 🎯 cadre 4:3 arcade propre */
.wrapper {
  position: relative;

  width: calc(100vw + (var(--w) * 2));
  height: calc(75vh + (var(--h) * 2));

  max-width: calc(133.33vh + (var(--w) * 2));
  max-height: calc(100vh + (var(--h) * 2));

  background: black;
  overflow: hidden;

  transform: translate(var(--x), var(--y));
}

/* 🎮 iframe étirée depuis le centre */
iframe {
  position: absolute;
  top: 50%;
  left: 50%;

  width: calc(100% + (var(--w) * 2));
  height: calc(100% + (var(--h) * 2));

  border: none;
  display: block;

  transform: translate(-50%, -50%);
}

</style>
</head>

<body>

<div class="wrapper">
  <iframe
    src="https://gamesfrog.com/games/snes/super-mario-kart/iframe"
    scrolling="no"
    allowfullscreen
    loading="eager">
  </iframe>
</div>

</body>
</html>
