<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --zoom-x: 1;   /* 1 = normal, 1.02 = plus large, 0.98 = plus étroit */
  --zoom-y: 1.8;   /* 1 = normal, 1.02 = plus haut, 0.98 = plus bas */
  --move-x: 0px; /* déplacement horizontal */
  --move-y: 25px; /* déplacement vertical */
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 🎯 cadre 4:3 arcade propre */
.wrapper {
  position: relative;
  width: 100vw;
  height: 75vh; /* ratio 4:3 */
  max-width: 133.33vh;
  max-height: 100vh;
  background: black;

  transform:
    translate(var(--move-x), var(--move-y))
    scaleX(var(--zoom-x))
    scaleY(var(--zoom-y));

  transform-origin: center center;
}

/* 🎮 iframe full clean */
iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}
</style>
</head>

<body>

<div class="wrapper">
  <iframe
    src="https://gamesfrog.com/games/snes/super-mario-kart/iframe"
    scrolling="no"
    allowfullscreen
    loading="eager">
  </iframe>
</div>

</body>
</html>
