<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🔧 AJUSTEMENTS */
:root {
  --w: 0px;   /* étire horizontalement des 2 côtés */
  --h: 40px;   /* étire verticalement des 2 côtés */
  --x: 0px;   /* déplace gauche/droite */
  --y: 0px;   /* déplace haut/bas */
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 🎯 cadre 4:3 arcade propre */
.wrapper {
  position: relative;

  /* base + étirement symétrique */
  width: calc(100vw + (var(--w) * 2));
  height: calc(75vh + (var(--h) * 2));

  /* on ajuste aussi les limites pour que l’effet reste visible */
  max-width: calc(133.33vh + (var(--w) * 2));
  max-height: calc(100vh + (var(--h) * 2));

  background: black;

  /* déplacement pixel par pixel */
  transform: translate(var(--x), var(--y));
}

/* 🎮 iframe full clean */
iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

</style>
</head>

<body>

<div class="wrapper">
  <iframe
    src="https://gamesfrog.com/games/snes/super-mario-kart/iframe"
    scrolling="no"
    allowfullscreen
    loading="eager">
  </iframe>
</div>

</body>
</html>
